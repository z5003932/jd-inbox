<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Story Bank — dav</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --bg-panel: #121212;
    --bg-row: #141414;
    --bg-row-hover: #1c1c1c;
    --bg-row-selected: #1a1a2e;
    --border: #262626;
    --border-strong: #3a3a3a;
    --text: #e8e8e8;
    --text-dim: #8a8a8a;
    --text-faint: #5a5a5a;
    --accent: #FF6B35;
    --green: #22c55e;
    --amber: #eab308;
    --blue: #3b82f6;
    --purple: #a855f7;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--text); font-family: 'Geist', sans-serif; font-size: 13px; line-height: 1.5; height: 100vh; overflow: hidden; }
  .mono { font-family: 'JetBrains Mono', monospace; }

  /* TOPBAR */
  header {
    display: flex; align-items: center; gap: 16px;
    padding: 14px 20px; border-bottom: 1px solid var(--border);
    background: var(--bg-panel); height: 56px; flex-shrink: 0;
  }
  .title { font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 8px; }
  .title-icon { color: var(--accent); }
  .nav-link { color: var(--text-dim); text-decoration: none; font-size: 13px; }
  .nav-link:hover { color: var(--text); }
  .count-badge { color: var(--text-faint); font-family: 'JetBrains Mono', monospace; font-size: 11px; }

  .search-box { flex: 1; max-width: 360px; position: relative; }
  .search-box input {
    width: 100%; padding: 7px 12px 7px 32px;
    background: var(--bg-row); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); font-size: 13px; font-family: inherit;
    outline: none;
  }
  .search-box input:focus { border-color: var(--border-strong); }
  .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-faint); font-size: 14px; pointer-events: none; }

  select {
    padding: 7px 10px; background: var(--bg-row); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); font-size: 12px; font-family: inherit; outline: none; cursor: pointer;
  }
  select:focus { border-color: var(--border-strong); }

  /* LAYOUT */
  .layout { display: flex; height: calc(100vh - 56px); }

  /* LIST PANE */
  .list-pane { width: 55%; border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }

  .list-header {
    display: grid; grid-template-columns: 130px 110px 1fr 70px;
    padding: 8px 16px; border-bottom: 1px solid var(--border);
    color: var(--text-faint); font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em;
    background: var(--bg-panel); flex-shrink: 0;
  }

  .list-body { overflow-y: auto; flex: 1; }

  .story-row {
    display: grid; grid-template-columns: 130px 110px 1fr 70px;
    padding: 10px 16px; border-bottom: 1px solid var(--border);
    cursor: pointer; transition: background 0.1s;
    align-items: start;
  }
  .story-row:hover { background: var(--bg-row-hover); }
  .story-row.selected { background: var(--bg-row-selected); border-left: 2px solid var(--blue); }

  .story-id { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--blue); padding-top: 1px; }
  .story-company { font-size: 11px; color: var(--text-dim); padding-top: 1px; }
  .story-summary { font-size: 12px; color: var(--text); line-height: 1.4; }
  .story-type-badge {
    font-size: 10px; padding: 2px 6px; border-radius: 3px; font-family: 'JetBrains Mono', monospace;
    text-align: center; width: fit-content;
  }
  .type-parent { background: #1a2744; color: var(--blue); }
  .type-child { background: #1a1a1a; color: var(--text-faint); }
  .type-standalone { background: #1a2a1a; color: var(--green); }
  .type-achievement { background: #2a1a2a; color: var(--purple); }
  .type-other { background: #2a2a1a; color: var(--amber); }

  /* DETAIL PANE */
  .detail-pane { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 20px; }

  .empty-state { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--text-faint); font-size: 13px; }

  .detail-header { display: flex; flex-direction: column; gap: 6px; }
  .detail-id { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--blue); }
  .detail-company { font-size: 12px; color: var(--text-dim); }
  .detail-initiative { font-size: 12px; color: var(--text-dim); }

  .section { display: flex; flex-direction: column; gap: 8px; }
  .section-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-faint); font-weight: 600; }
  .section-body { font-size: 13px; color: var(--text); line-height: 1.7; white-space: pre-wrap; word-break: break-word; }

  .tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag { font-size: 11px; padding: 2px 8px; background: var(--bg-row); border: 1px solid var(--border); border-radius: 3px; color: var(--text-dim); }

  .pagination { display: flex; align-items: center; gap: 12px; padding: 10px 16px; border-top: 1px solid var(--border); background: var(--bg-panel); flex-shrink: 0; }
  .page-btn { padding: 5px 10px; background: var(--bg-row); border: 1px solid var(--border); border-radius: 4px; color: var(--text-dim); cursor: pointer; font-family: inherit; font-size: 12px; }
  .page-btn:hover:not(:disabled) { border-color: var(--border-strong); color: var(--text); }
  .page-btn:disabled { opacity: 0.3; cursor: default; }
  .page-info { font-size: 12px; color: var(--text-faint); font-family: 'JetBrains Mono', monospace; }
</style>
</head>
<body>

<header>
  <div class="title">
    <span class="title-icon">◈</span>
    Story Bank
    <span class="count-badge" id="total-badge"></span>
  </div>
  <div class="search-box">
    <span class="search-icon">⌕</span>
    <input type="text" id="search" placeholder="Search stories..." autocomplete="off" />
  </div>
  <select id="company-filter"><option value="">All companies</option></select>
  <select id="type-filter">
    <option value="">All types</option>
    <option value="parent">parent</option>
    <option value="standalone">standalone</option>
    <option value="child">child</option>
    <option value="achievement">achievement</option>
  </select>
  <a href="/" class="nav-link">← JD Inbox</a>
</header>

<div class="layout">
  <div class="list-pane">
    <div class="list-header">
      <span>Story ID</span>
      <span>Company</span>
      <span>Summary</span>
      <span>Type</span>
    </div>
    <div class="list-body" id="list-body">
      <div class="empty-state">Loading...</div>
    </div>
    <div class="pagination">
      <button class="page-btn" id="prev-btn" disabled>← Prev</button>
      <span class="page-info" id="page-info"></span>
      <button class="page-btn" id="next-btn" disabled>Next →</button>
    </div>
  </div>

  <div class="detail-pane" id="detail-pane">
    <div class="empty-state">Select a story to read it</div>
  </div>
</div>

<script>
const state = {
  stories: [], total: 0, offset: 0, limit: 100,
  company: '', type: '', q: '',
  selected: null,
};

let searchTimer = null;

async function load() {
  const params = new URLSearchParams({
    limit:  state.limit,
    offset: state.offset,
  });
  if (state.company) params.set('company', state.company);
  if (state.type)    params.set('type',    state.type);
  if (state.q)       params.set('q',       state.q);

  const resp = await fetch(`/api/stories?${params}`);
  const data = await resp.json();

  state.stories = data.stories;
  state.total   = data.total;

  // populate company dropdown once
  const sel = document.getElementById('company-filter');
  if (sel.options.length <= 1) {
    data.companies.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c; opt.textContent = c;
      sel.appendChild(opt);
    });
  }

  renderList();
  renderPagination();
  document.getElementById('total-badge').textContent = `${data.total} stories`;
}

function typeBadge(type) {
  const cls = {
    parent: 'type-parent', child: 'type-child',
    standalone: 'type-standalone', achievement: 'type-achievement',
  }[type] || 'type-other';
  return `<span class="story-type-badge ${cls}">${type || '—'}</span>`;
}

function renderList() {
  const body = document.getElementById('list-body');
  if (!state.stories.length) {
    body.innerHTML = '<div class="empty-state">No stories found</div>';
    return;
  }
  body.innerHTML = state.stories.map(s => `
    <div class="story-row${state.selected === s.story_id ? ' selected' : ''}"
         onclick="selectStory('${s.story_id}')">
      <span class="story-id">${s.story_id}</span>
      <span class="story-company">${s.company}</span>
      <span class="story-summary">${(s.component_summary || '').slice(0, 120)}${s.component_summary && s.component_summary.length > 120 ? '…' : ''}</span>
      <span>${typeBadge(s.story_type)}</span>
    </div>
  `).join('');
}

function renderPagination() {
  const page     = Math.floor(state.offset / state.limit) + 1;
  const pages    = Math.ceil(state.total / state.limit);
  const showing  = Math.min(state.offset + state.limit, state.total);
  document.getElementById('page-info').textContent =
    `${state.offset + 1}–${showing} of ${state.total}`;
  document.getElementById('prev-btn').disabled = state.offset === 0;
  document.getElementById('next-btn').disabled = showing >= state.total;
}

async function selectStory(id) {
  state.selected = id;
  renderList();

  const resp = await fetch(`/api/stories/${id}`);
  const s    = await resp.json();
  const pane = document.getElementById('detail-pane');

  const tags = (val) => val
    ? val.split(/[,;•\n]/).map(t => t.trim()).filter(Boolean)
        .map(t => `<span class="tag">${t}</span>`).join('')
    : '';

  pane.innerHTML = `
    <div class="detail-header">
      <span class="detail-id">${s.story_id}</span>
      <span class="detail-company">${s.company} ${s.year ? '· ' + s.year : ''} ${s.story_type ? '· ' + s.story_type : ''}</span>
      ${s.initiative ? `<span class="detail-initiative">${s.initiative}${s.sub_initiative ? ' → ' + s.sub_initiative : ''}</span>` : ''}
    </div>

    ${s.component_summary ? `
    <div class="section">
      <div class="section-label">Component Summary</div>
      <div class="section-body">${s.component_summary}</div>
    </div>` : ''}

    ${s.pointer_summary ? `
    <div class="section">
      <div class="section-label">Pointer Summary</div>
      <div class="section-body">${s.pointer_summary}</div>
    </div>` : ''}

    ${s.outcomes ? `
    <div class="section">
      <div class="section-label">Outcomes</div>
      <div class="section-body">${s.outcomes}</div>
    </div>` : ''}

    ${s.work_behind ? `
    <div class="section">
      <div class="section-label">Work Behind the Work</div>
      <div class="section-body">${s.work_behind}</div>
    </div>` : ''}

    ${s.themes ? `
    <div class="section">
      <div class="section-label">Themes</div>
      <div class="tags">${tags(s.themes)}</div>
    </div>` : ''}

    ${s.skills_demonstrated ? `
    <div class="section">
      <div class="section-label">Skills</div>
      <div class="tags">${tags(s.skills_demonstrated)}</div>
    </div>` : ''}

    ${s.role_relevance ? `
    <div class="section">
      <div class="section-label">Role Relevance</div>
      <div class="section-body">${s.role_relevance}</div>
    </div>` : ''}

    ${s.parent_story_id ? `
    <div class="section">
      <div class="section-label">Parent Story</div>
      <div class="section-body mono" style="color:var(--blue);cursor:pointer" onclick="selectStory('${s.parent_story_id}')">${s.parent_story_id}</div>
    </div>` : ''}
  `;
}

// Controls
document.getElementById('search').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    state.q = e.target.value.trim();
    state.offset = 0;
    load();
  }, 300);
});

document.getElementById('company-filter').addEventListener('change', e => {
  state.company = e.target.value;
  state.offset  = 0;
  load();
});

document.getElementById('type-filter').addEventListener('change', e => {
  state.type   = e.target.value;
  state.offset = 0;
  load();
});

document.getElementById('prev-btn').addEventListener('click', () => {
  state.offset = Math.max(0, state.offset - state.limit);
  load();
});

document.getElementById('next-btn').addEventListener('click', () => {
  state.offset += state.limit;
  load();
});

load();
</script>
</body>
</html>
